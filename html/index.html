<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OlegCloud - Головна</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        /* Анімація для появи панелі дій знизу */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-300 overflow-x-hidden relative">

    <div class="md:hidden flex items-center justify-between p-4 bg-gray-800 border-b border-gray-700 sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <svg class="h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 0 0 4.5 4.5H18a3.75 3.75 0 0 0 1.332-7.257 3 3 0 0 0-3.758-3.758A3.75 3.75 0 0 0 12 3c-1.268 0-2.417.47-3.32 1.257a3.75 3.75 0 0 0-4.09 4.904A4.5 4.5 0 0 0 2.25 15Z" />
            </svg>
            <span class="text-xl font-bold text-gray-100">OlegCloud</span>
        </div>
        <button onclick="toggleSidebar()" class="text-gray-300 focus:outline-none p-2">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <div class="flex min-h-screen relative">

        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden glass"></div>

        <aside id="sidebar" class="sidebar-transition fixed inset-y-0 left-0 z-50 w-64 bg-gray-800 border-r border-gray-700 flex flex-col transform -translate-x-full md:translate-x-0 md:static md:h-screen">
            <div class="hidden md:flex items-center justify-between p-4 border-b border-gray-700 h-16">
                <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <svg class="h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 0 0 4.5 4.5H18a3.75 3.75 0 0 0 1.332-7.257 3 3 0 0 0-3.758-3.758A3.75 3.75 0 0 0 12 3c-1.268 0-2.417.47-3.32 1.257a3.75 3.75 0 0 0-4.09 4.904A4.5 4.5 0 0 0 2.25 15Z" />
                    </svg>
                    <span class="text-xl font-bold text-gray-100">OlegCloud</span>
                </a>
            </div>

            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <a href="index.html" class="flex items-center gap-3 px-3 py-2 bg-blue-600 text-white rounded-md font-medium transition-colors">
                    <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
                    </svg>
                    <span>Мої файли</span>
                </a>
                
                <a href="storage.html" class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-700 hover:text-white rounded-md font-medium transition-colors">
                    <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                    </svg>
                    <span>Аналітика</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-700 bg-gray-800">
                <div class="flex items-center gap-3 mb-3">
                    <div id="user-avatar" class="h-8 w-8 rounded-full flex items-center justify-center text-white font-bold transition-colors">U</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium text-white truncate" id="user-email-display">user</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-3 py-2 text-sm text-red-400 hover:text-white hover:bg-red-900/50 rounded-md transition-colors border border-gray-700 hover:border-red-800">
                    Вийти
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-6 overflow-y-auto h-[calc(100vh-64px)] md:h-screen relative">
            
            <div class="flex flex-col md:flex-row items-start md:items-center gap-4 mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-gray-100 whitespace-nowrap">
                    Мої файли
                </h1>
                
                <div class="flex-1 w-full flex justify-center md:px-4">
                    <div class="relative w-full max-w-3xl search-container">
                        <input 
                            type="search" 
                            placeholder="Пошук файлів..." 
                            oninput="handleSearch(this.value)" 
                            class="w-full pl-10 md:pl-12 pr-4 py-2 md:py-3 text-sm md:text-base rounded-full bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm"
                        >
                        <svg class="h-5 w-5 md:h-6 md:w-6 text-gray-500 absolute left-3 md:left-4 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                        </svg>
                        <div id="search-results-dropdown" class="hidden absolute top-full left-0 w-full bg-gray-800 border border-gray-700 rounded-2xl shadow-xl z-50 mt-2 max-h-96 overflow-y-auto"></div>
                    </div>
                </div>
            </div>

            <div id="empty-state" class="hidden text-center py-20 bg-gray-800/50 rounded-xl border border-dashed border-gray-700">
                <svg class="mx-auto h-12 w-12 text-gray-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
                </svg>
                <h3 class="mt-2 text-sm font-semibold text-gray-100">Немає файлів</h3>
                <p class="mt-1 text-sm text-gray-400">Завантажте свій перший файл.</p>
                <div class="mt-6">
                    <label for="file-input" class="inline-flex items-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 transition-colors cursor-pointer">
                        Завантажити файл
                    </label>
                </div>
            </div>

            <div id="files-table-container" class="hidden pb-24">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-gray-200">Ваші документи</h2>
                    <label for="file-input" class="bg-blue-600 hover:bg-blue-500 text-white px-3 md:px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 cursor-pointer shadow-lg active:scale-95">
                        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z" /></svg>
                        <span class="hidden md:inline">Додати файл</span> <span class="md:hidden">Додати</span>
                    </label>
                </div>

                <div class="bg-gray-800 rounded-lg shadow-sm border border-gray-700 overflow-visible min-h-[200px]">
                    <div class="overflow-x-auto md:overflow-visible">
                        <table class="min-w-full divide-y divide-gray-700">
                            <thead class="bg-gray-700/50">
                                <tr>
                                    <th class="w-12 px-4 py-3 text-left"></th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Назва</th>
                                    <th class="hidden md:table-cell px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Дата</th>
                                    <th class="hidden md:table-cell px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Розмір</th>
                                    <th class="relative px-6 py-3"><span class="sr-only">Дії</span></th>
                                </tr>
                            </thead>
                            <tbody id="files-table-body" class="bg-gray-800 divide-y divide-gray-700">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <input type="file" id="file-input" multiple class="opacity-0 absolute w-1 h-1 -z-10" onchange="uploadFile(this)">
            
            <div id="progress-container" class="hidden fixed bottom-24 md:bottom-4 right-4 w-80 bg-gray-800 border border-gray-700 p-4 rounded-xl shadow-2xl z-50">
                <div class="flex justify-between mb-1">
                    <span class="text-sm font-medium text-blue-400" id="progress-filename">Завантаження...</span>
                    <span class="text-sm font-medium text-gray-300" id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2.5 mb-2">
                    <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p class="text-xs text-gray-400 text-right" id="progress-time">Залишилось: -- с</p>
            </div>

            <div id="preview-modal" class="fixed inset-0 z-[60] hidden bg-black/90 flex items-center justify-center p-2 md:p-4 backdrop-blur-sm">
                <div class="bg-gray-800 rounded-lg shadow-2xl w-full max-w-7xl h-[85vh] md:h-[90vh] flex flex-col border border-gray-700">
                    <div class="flex justify-between items-center p-4 border-b border-gray-700 bg-gray-800 rounded-t-lg">
                        <h3 id="modal-filename" class="text-base md:text-lg font-semibold text-gray-100 truncate pr-4">Перегляд</h3>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                            <svg class="h-6 w-6 md:h-8 md:w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                    </div>
                    <div id="modal-content" class="flex-1 overflow-hidden flex items-center justify-center bg-gray-900 relative">
                        <span class="text-gray-500 animate-pulse">Завантаження...</span>
                    </div>
                    <div class="p-4 border-t border-gray-700 bg-gray-800 rounded-b-lg flex justify-between items-center">
                        <button onclick="closeModal()" class="px-3 py-2 md:px-4 bg-gray-700 text-white rounded hover:bg-gray-600 text-sm md:text-base">Закрити</button>
                        <a id="download-link" href="#" download class="px-3 py-2 md:px-4 bg-blue-600 text-white rounded hover:bg-blue-500 flex items-center gap-2 text-sm md:text-base">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            Скачати
                        </a>
                    </div>
                </div>
            </div>

		<div id="bulk-actions" class="hidden fixed bottom-4 left-1/2 transform -translate-x-1/2 w-[90%] md:w-auto bg-gray-800 border border-gray-600 shadow-2xl rounded-2xl md:rounded-full px-4 py-3 z-[60] flex items-center justify-between md:justify-center gap-4 md:gap-6 animate-fade-in-up">
    
		    <div class="flex items-center gap-2 md:border-r md:border-gray-600 md:pr-6">
		        <div class="bg-blue-600 text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center flex-shrink-0" id="selected-count-badge">0</div>
		        <span class="text-sm font-medium text-gray-300 whitespace-nowrap">Вибрано</span>
		    </div>

		    <div class="flex items-center gap-2 md:gap-3">
		        <button onclick="window.downloadSelectedFiles()" class="p-2 text-gray-400 hover:text-white hover:bg-gray-700 rounded-full transition-colors flex-shrink-0">
		             <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
		        </button>

		        <button onclick="alert('Скоро!')" class="p-2 text-gray-400 hover:text-white hover:bg-gray-700 rounded-full transition-colors flex-shrink-0">
		            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
		        </button>

		        <div class="w-px h-6 bg-gray-600 mx-1 hidden md:block"></div>

		        <button onclick="window.deleteSelectedFiles()" class="text-red-400 hover:text-red-300 hover:bg-red-900/30 px-3 py-1.5 rounded-full text-sm font-medium transition-colors flex items-center gap-2">
		            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
		            <span class="hidden md:inline">Видалити</span>
		        </button>
		    </div>
		</div>
        </main>
    </div>

<div id="drop-zone" class="hidden fixed inset-0 z-[100] bg-gray-900/90 flex flex-col items-center justify-center backdrop-blur-sm transition-all border-4 border-dashed border-blue-500 m-4 rounded-3xl">
        <svg class="h-24 w-24 text-blue-500 mb-4 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <h2 class="text-3xl font-bold text-white mb-2">Відпустіть файли тут</h2>
        <p class="text-blue-200 text-lg">щоб почати завантаження</p>
    </div>

	<div id="context-menu" class="hidden fixed z-[70] w-56 bg-gray-800 border border-gray-700 rounded-lg shadow-xl py-1 text-sm text-gray-200 overflow-hidden transform transition-opacity duration-100">
    <button id="ctx-view" class="w-full text-left px-4 py-2 hover:bg-gray-700 flex items-center gap-2 transition-colors">
        <svg class="h-4 w-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
        Переглянути
    </button>
    
    <button id="ctx-download" class="w-full text-left px-4 py-2 hover:bg-gray-700 flex items-center gap-2 transition-colors">
        <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
        Скачати
    </button>
    
    <button id="ctx-rename" class="w-full text-left px-4 py-2 hover:bg-gray-700 flex items-center gap-2 transition-colors">
        <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
        Перейменувати
    </button>

    <div class="border-t border-gray-700 my-1"></div>
    
    <button id="ctx-delete" class="w-full text-left px-4 py-2 hover:bg-red-900/50 text-red-400 flex items-center gap-2 transition-colors">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        Видалити
    </button>
</div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
