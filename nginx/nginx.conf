events {}

http {
    # --- 1. РОЗМІР ФАЙЛУ ---
    client_max_body_size 1024M; 

    # --- 2. ТАЙМ-АУТИ ---
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    fastcgi_read_timeout 600s;
    
    # Збільшуємо час життя з'єднання
    keepalive_timeout 600s;

    # --- 3. БУФЕРИЗАЦІЯ ---
    client_body_buffer_size 50M;
    # --- ЗАХИСТ (Rate Limiting) ---
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=2r/s; 

    server {
        listen 80;

        # Застосовуємо ліміт запитів
        limit_req zone=mylimit burst=100 nodelay;

        # --- ФРОНТЕНД ---
        location / {
            root /usr/share/nginx/html;
            index index.html;
            # Якщо файл не знайдено, пробуємо відкрити як папку, якщо ні - логін
            try_files $uri $uri/ /login.html;
        }

        # --- БЕКЕНД (API) ---
        location /api/ {
            proxy_pass http://backend:8000;
            
            # Передаємо заголовки, щоб Python бачив реальну IP користувача
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Вимикаємо буферизацію проксі, щоб дані проходили швидше
            # (корисно для стрімінгу або довгих завантажень)
            proxy_buffering off; 
        }
    }
}
